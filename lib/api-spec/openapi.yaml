    FlowEvent:
      type: object
      properties:
        id:
          type: string
        underlying:
          type: string
        provider:
          $ref: "#/components/schemas/FlowDataProvider"
        basis:
          $ref: "#/components/schemas/FlowEventBasis"
        optionTicker:
          type: string
        providerContractId:
          type: [string, "null"]
          description: Broker contract identifier, when the flow source can map the option to a broker-backed contract.
        strike:
          type: number
        expirationDate:
          type: string
          format: date
        right:
          $ref: "#/components/schemas/OptionRight"
        price:
          type: number
        bid:
          type: [number, "null"]
          description: Best bid observed with the event or snapshot, when available.
        ask:
          type: [number, "null"]
          description: Best ask observed with the event or snapshot, when available.
        last:
          type: [number, "null"]
          description: Last option price observed with the event or snapshot, when available.
        mark:
          type: [number, "null"]
          description: Mark or midpoint price used for snapshot-derived flow, when available.
        size:
          type: number
        premium:
          type: number
        multiplier:
          type: [number, "null"]
          description: Option contract multiplier, when the source provides it.
        sharesPerContract:
          type: [number, "null"]
          description: Shares represented by one option contract, when the source provides it.
        openInterest:
          type: number
        impliedVolatility:
          oneOf:
            - type: number
            - type: "null"
        delta:
          type: [number, "null"]
        gamma:
          type: [number, "null"]
        theta:
          type: [number, "null"]
        vega:
          type: [number, "null"]
        underlyingPrice:
          type: [number, "null"]
          description: Underlying reference price used to classify moneyness, when available.
        moneyness:
          type: [string, "null"]
          enum: [ITM, ATM, OTM, UNKNOWN, null]
        distancePercent:
          type: [number, "null"]
          description: Signed strike distance from the underlying reference price, in percent.
        confidence:
          type: string
          enum: [confirmed_trade, snapshot_activity, fallback_estimate]
          description: Data-confidence class for the flow row.
        sourceBasis:
          type: string
          enum: [confirmed_trade, snapshot_activity, fallback_estimate]
          description: Machine-readable source basis shown by the Flow UI.
        exchange:
          type: string
        side:
          type: string
        sentiment:
          $ref: "#/components/schemas/FlowSentiment"
        tradeConditions:
          type: array
          items:
            type: string
        occurredAt:
          type: string
          format: date-time
        unusualScore:
          type: number
          description: >-
            Volume divided by prior-session open interest, capped at 10. Higher
            values indicate the event is more likely to be a fresh
            institutional position rather than routine market-maker turnover.
        isUnusual:
          type: boolean
          description: >-
            True when the contract's day volume meets or exceeds its open
            interest (the default unusual-flow threshold).
      required:
        - id
        - underlying
        - provider
        - basis
        - optionTicker
        - providerContractId
        - strike
        - expirationDate
        - right
        - price
        - size
        - premium
        - openInterest
        - impliedVolatility
        - exchange
        - side
        - sentiment
        - tradeConditions
        - occurredAt
        - unusualScore
        - isUnusual

