kind = "web"
previewPath = "/"
title = "RayAlgo Platform"
version = "1.0.0"
id = "artifacts/rayalgo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18747
ensurePreviewReachable = "/"

[services.development]
run = "pnpm --filter @workspace/rayalgo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rayalgo", "run", "build" ]
publicDir = "artifacts/rayalgo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18747"
BASE_PATH = "/"
