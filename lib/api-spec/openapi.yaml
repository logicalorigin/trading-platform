openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Internal trading platform API for Polygon market data and IBKR execution.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Service health operations
  - name: session
    description: Runtime/session metadata
  - name: broker
    description: Broker connection metadata
  - name: accounts
    description: Brokerage account state
  - name: watchlists
    description: Saved user watchlists
  - name: market-data
    description: Quotes, bars, and options chain data
  - name: orders
    description: Order and execution lifecycle
  - name: flow
    description: Options flow and unusual activity feeds
  - name: signal-monitor
    description: RayReplica watchlist signal monitoring
  - name: research
    description: Server-side fundamentals, filings, transcripts, and catalyst data
  - name: automation
    description: Algo deployment lifecycle and execution event history
  - name: backtests
    description: Backtest studies, runs, sweeps, and draft strategy promotion
  - name: diagnostics
    description: Real-time and historical operator diagnostics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /session:
    get:
      operationId: getSession
      tags: [session]
      summary: Get runtime session metadata
      description: Returns environment, provider, and configuration status information.
      responses:
        "200":
          description: Session metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionInfo"

  /diagnostics/runtime:
    get:
      operationId: getRuntimeDiagnostics
      tags: [diagnostics]
      summary: Get runtime diagnostics
      description: Returns read-only bridge, API memory, chart-support, and order-capability diagnostics.
      responses:
        "200":
          description: Runtime diagnostics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeDiagnosticsResponse"

  /diagnostics/latest:
    get:
      operationId: getLatestDiagnostics
      tags: [diagnostics]
      summary: Get latest diagnostics rollup
      responses:
        "200":
          description: Latest diagnostics rollup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticsLatestResponse"

  /diagnostics/history:
    get:
      operationId: listDiagnosticHistory
      tags: [diagnostics]
      summary: List historical diagnostic snapshots
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: subsystem
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Diagnostic history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticHistoryResponse"

  /diagnostics/events:
    get:
      operationId: listDiagnosticEvents
      tags: [diagnostics]
      summary: List grouped diagnostic events and incidents
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: subsystem
          in: query
          schema:
            type: string
        - name: severity
          in: query
          schema:
            $ref: "#/components/schemas/DiagnosticSeverity"
      responses:
        "200":
          description: Diagnostic events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticEventsResponse"

  /diagnostics/events/{eventId}:
    get:
      operationId: getDiagnosticEventDetail
      tags: [diagnostics]
      summary: Get diagnostic event detail
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Diagnostic event detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticEventDetailResponse"

  /diagnostics/thresholds:
    get:
      operationId: getDiagnosticThresholds
      tags: [diagnostics]
      summary: Get diagnostic thresholds
      responses:
        "200":
          description: Diagnostic thresholds
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticThresholdsResponse"
    put:
      operationId: updateDiagnosticThresholds
      tags: [diagnostics]
      summary: Update diagnostic threshold overrides
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagnosticThresholdsUpdateRequest"
      responses:
        "200":
          description: Updated diagnostic thresholds
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticThresholdsResponse"

  /diagnostics/client-events:
    post:
      operationId: recordClientDiagnosticEvent
      tags: [diagnostics]
      summary: Record a browser/client diagnostic event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagnosticClientEventRequest"
      responses:
        "202":
          description: Recorded diagnostic event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticEventRecordResponse"

  /diagnostics/export:
    get:
      operationId: exportDiagnostics
      tags: [diagnostics]
      summary: Export raw diagnostics for the selected window
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: subsystem
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Raw diagnostic export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticExportResponse"

  /diagnostics/stream:
    get:
      operationId: streamDiagnostics
      tags: [diagnostics]
      summary: Stream live diagnostic snapshots and events
      responses:
        "200":
          description: Diagnostic SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /broker-connections:
    get:
      operationId: listBrokerConnections
      tags: [broker]
      summary: List configured broker and market data connections
      responses:
        "200":
          description: Connection inventory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerConnectionsResponse"

  /accounts:
    get:
      operationId: listAccounts
      tags: [accounts]
      summary: List broker accounts
      parameters:
        - name: mode
          in: query
          description: Filter by paper or live environment.
          required: false
          schema:
            $ref: "#/components/schemas/EnvironmentMode"
      responses:
        "200":
          description: Account list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountsResponse"

  /accounts/flex/health:
    get:
      operationId: getFlexHealth
      tags: [accounts]
      summary: Get IBKR Flex setup and refresh health
      responses:
        "200":
          description: Flex integration health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlexHealthResponse"

  /accounts/flex/test:
    post:
      operationId: testFlexToken
      tags: [accounts]
      summary: Test the configured IBKR Flex token and query
      responses:
        "200":
          description: Flex test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlexTestResponse"

  /accounts/{accountId}/summary:
    get:
      operationId: getAccountSummary
      tags: [accounts]
      summary: Get live account header metrics
      parameters:
        - $ref: "#/components/parameters/AccountIdPath"
        - name: mode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EnvironmentMode"
      responses:
        "200":
          description: Account summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountSummaryResponse"

  /accounts/{accountId}/equity-history:
    get:
      operationId: getAccountEquityHistory
      tags: [accounts]
      summary: Get Flex and intraday NAV history
      parameters:
        - $ref: "#/components/parameters/AccountIdPath"
        - name: range
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountHistoryRange"
        - name: benchmark
          in: query
          required: false
          schema:
            type: string
        - name: mode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EnvironmentMode"
      responses:
        "200":
          description: Equity history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountEquityHistoryResponse"

  /accounts/{accountId}/trading-patterns:
    get:
      operationId: getAccountTradingPatterns
      tags: [accounts]
      summary: Get Shadow trading pattern analytics and AI packet
      parameters:
        - $ref: "#/components/parameters/AccountIdPath"
        - name: range
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AccountHistoryRange"
        - name: snapshotId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Trading pattern analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountTradingPatternsResponse"

  /accounts/{accountId}/trading-patterns/snapshots:
    post:
      operationId: createAccountTradingPatternsSnapshot
      tags: [accounts]
      summary: Persist a Shadow trading pattern analysis snapshot
      parameters:
        - $ref: "#/components/parameters/AccountIdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountTradingPatternsSnapshotRequest"
      responses:
        "201":
          description: Persisted trading pattern analytics snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountTradingPatternsResponse"

  /accounts/{accountId}/allocation:
    get:
      operationId: getAccountAllocation
      tags: [accounts]
      summary: Get allocation and exposure summary
      parameters:
        - $ref: "#/components/parameters/AccountIdPath"
        - name: mode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EnvironmentMode"
      responses:
        "200":
          description: Allocation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountAllocationResponse"

  /accounts/{accountId}/positions:
    get:
      operationId: getAccountPositions
      tags: [accounts]
      summary: Get current positions with lots and open order context
      parameters:
        - $ref: "#/components/parameters/AccountIdPath"
        - name: assetClass
          in: query
          required: false
          schema:
            type: string
        - name: mode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EnvironmentMode"
      responses:
        "200":
          description: Current positions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountPositionsResponse"

  /accounts/{accountId}/positions-at-date:
    get:
      operationId: getAccountPositionsAtDate
      tags: [accounts]
      summary: Get positions and activity for an account date
      parameters:
        - $ref: "#/components/parameters/AccountIdPath"
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: assetClass
          in: query
          required: false
          schema:
            type: string
        - name: mode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EnvironmentMode"
      responses:
        "200":
          description: Account positions and activity at selected date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountPositionsAtDateResponse"

  /accounts/{accountId}/closed-trades:
    get:
      operationId: getAccountClosedTrades
      tags: [accounts]
      summary: Get closed trades and recent live executions
      parameters:
        - $ref: "#/components/parameters/AccountIdPath"
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: symbol
          in: query
          required: false
          schema:
            type: string
        - name: assetClass
          in: query
          required: false
          schema:
            type: string
        - name: pnlSign
          in: query
          required: false
          schema:
            type: string
            enum: [all, winners, losers]
        - name: holdDuration
          in: query
          required: false
          schema:
            type: string
        - name: mode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EnvironmentMode"
      responses:
        "200":
          description: Closed trades
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountClosedTradesResponse"

  /accounts/{accountId}/orders:
    get:
      operationId: getAccountOrders
      tags: [accounts]
      summary: Get working or historical orders for an account
      parameters:
        - $ref: "#/components/parameters/AccountIdPath"
        - name: tab
          in: query
          required: false
          schema:
            type: string
            enum: [working, history]
        - name: mode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EnvironmentMode"
      responses:
        "200":
          description: Account orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountOrdersResponse"

  /accounts/{accountId}/orders/{orderId}/cancel:
    post:
      operationId: cancelAccountOrder
      tags: [accounts]
      summary: Cancel a working order from the Account screen
      parameters:
        - $ref: "#/components/parameters/AccountIdPath"
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelAccountOrderRequest"
      responses:
        "200":
          description: Cancel result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelOrderResponse"

  /accounts/{accountId}/risk:
    get:
      operationId: getAccountRisk
      tags: [accounts]
      summary: Get portfolio risk dashboard metrics
      parameters:
        - $ref: "#/components/parameters/AccountIdPath"
        - name: mode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EnvironmentMode"
      responses:
        "200":
          description: Account risk
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountRiskResponse"

  /accounts/{accountId}/cash-activity:
    get:
      operationId: getAccountCashActivity
      tags: [accounts]
      summary: Get cash and funding activity
      parameters:
        - $ref: "#/components/parameters/AccountIdPath"
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: mode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EnvironmentMode"
      responses:
        "200":
          description: Cash activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountCashActivityResponse"

  /watchlists:
    get:
      operationId: listWatchlists
      tags: [watchlists]
      summary: List saved watchlists
      responses:
        "200":
          description: Watchlists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistsResponse"

  /positions:
    get:
      operationId: listPositions
      tags: [accounts]
      summary: List open positions
      parameters:
        - name: accountId
          in: query
          required: false
          schema:
            type: string
        - name: mode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EnvironmentMode"
      responses:
        "200":
          description: Positions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PositionsResponse"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      parameters:
        - name: accountId
          in: query
          required: false
          schema:
            type: string
        - name: mode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EnvironmentMode"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OrderStatus"
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdersResponse"
    post:
      operationId: placeOrder
      tags: [orders]
      summary: Submit an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceOrderRequest"
      responses:
        "201":
          description: Accepted order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/preview:
    post:
      operationId: previewOrder
      tags: [orders]
      summary: Preview a normalized IBKR order payload before submission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceOrderRequest"
      responses:
        "200":
          description: Preview payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderPreview"

  /shadow/orders/preview:
    post:
      operationId: previewShadowOrder
      tags: [orders]
      summary: Preview an internal Shadow account fill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceOrderRequest"
      responses:
        "200":
          description: Shadow fill preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderPreview"

  /shadow/orders:
    post:
      operationId: placeShadowOrder
      tags: [orders]
      summary: Record an internal Shadow account fill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceOrderRequest"
      responses:
        "201":
          description: Shadow order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountOrder"

  /orders/submit:
    post:
      operationId: submitOrders
      tags: [orders]
      summary: Submit either a normalized order request or raw IBKR order payloads
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/PlaceOrderRequest"
                - $ref: "#/components/schemas/SubmitIbkrOrdersRequest"
      responses:
        "201":
          description: Accepted order payload
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Order"
                  - $ref: "#/components/schemas/SubmitIbkrOrdersResponse"

  /orders/{orderId}/replace:
    post:
      operationId: replaceOrder
      tags: [orders]
      summary: Replace an existing IBKR order using the raw IBKR modify payload
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplaceOrderRequest"
      responses:
        "200":
          description: Updated order snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{orderId}/cancel:
    post:
      operationId: cancelOrder
      tags: [orders]
      summary: Request cancellation for an existing IBKR order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelOrderRequest"
      responses:
        "200":
          description: Cancellation request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelOrderResponse"

  /quotes/snapshot:
    get:
      operationId: getQuoteSnapshots
      tags: [market-data]
      summary: Get latest quotes for symbols
      parameters:
        - name: symbols
          in: query
          required: true
          description: Comma-separated ticker symbols.
          schema:
            type: string
      responses:
        "200":
          description: Latest quotes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteSnapshotsResponse"

  /options/quotes:
    post:
      operationId: getOptionQuoteSnapshots
      tags: [market-data]
      summary: Get latest option quotes for provider contract IDs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptionQuoteSnapshotsRequest"
      responses:
        "200":
          description: Latest option quote snapshots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptionQuoteSnapshotsResponse"

  /news:
    get:
      operationId: getNews
      tags: [market-data]
      summary: Get latest market news articles
      parameters:
        - name: ticker
          in: query
          required: false
          description: Optional ticker to filter articles by symbol.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Maximum number of articles to return.
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Latest market news articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsResponse"

  /universe/tickers:
    get:
      operationId: searchUniverseTickers
      tags: [market-data]
      summary: Search the ticker universe
      parameters:
        - name: search
          in: query
          required: false
          description: Search within the ticker symbol and company name.
          schema:
            type: string
        - name: market
          in: query
          required: false
          description: Restrict results to a market.
          schema:
            $ref: "#/components/schemas/UniverseMarket"
        - name: markets
          in: query
          required: false
          description: Restrict results to one or more markets. Takes precedence over market when provided.
          style: form
          explode: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/UniverseMarket"
        - name: type
          in: query
          required: false
          description: Optional Polygon ticker type filter.
          schema:
            type: string
        - name: active
          in: query
          required: false
          description: Restrict results to active tickers.
          schema:
            type: boolean
        - name: mode
          in: query
          required: false
          description: Optional search mode. Use trade-resolve when Trade needs an exact IBKR-tradable contract.
          schema:
            type: string
            enum: [search, trade-resolve]
        - name: strictTrade
          in: query
          required: false
          description: Require an exact IBKR-tradable contract instead of returning fuzzy discovery matches.
          schema:
            type: boolean
        - name: limit
          in: query
          required: false
          description: Requested number of ranked search results to return. No artificial maximum is enforced by the API; clients should request progressively larger pages for large universes.
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Ticker universe search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UniverseTickersResponse"

  /bars:
    get:
      operationId: getBars
      tags: [market-data]
      summary: Get broker-first historical bars for a symbol or contract
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: timeframe
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/BarTimeframe"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50000
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: historyCursor
          in: query
          required: false
          description: Opaque server-issued cursor for provider-native historical continuation. Falls back to from/to when invalid or expired.
          schema:
            type: string
            nullable: true
        - name: preferCursor
          in: query
          required: false
          description: Prefer historyCursor continuation before the normal from/to window when a cursor is present.
          schema:
            type: boolean
        - name: assetClass
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AssetClass"
        - name: market
          in: query
          required: false
          description: Provider market context from ticker search; used to avoid cross-asset historical fallbacks.
          schema:
            $ref: "#/components/schemas/UniverseMarket"
        - name: providerContractId
          in: query
          required: false
          schema:
            type: string
            nullable: true
        - name: outsideRth
          in: query
          required: false
          schema:
            type: boolean
        - name: source
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BarDataSource"
        - name: allowHistoricalSynthesis
          in: query
          required: false
          description: Allow Polygon/Massive historical synthesis when IBKR history is incomplete. Defaults to enabled for broker-limited equity history unless explicitly false.
          schema:
            type: boolean
        - name: allowStudyFallback
          in: query
          required: false
          description: Allow chart-only synthetic option quote fallback bars when broker and aggregate history are empty. Do not use synthetic quote fallback for backtests, signals, or order logic; Polygon/Massive aggregate history remains valid for backtests.
          schema:
            type: boolean
        - name: brokerRecentWindowMinutes
          in: query
          required: false
          description: Limit broker-sourced recent history to this many minutes before falling back to Massive/Polygon history.
          schema:
            type: integer
            minimum: 0
