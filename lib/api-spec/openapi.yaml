openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Internal trading platform API for Polygon market data and IBKR execution.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Service health operations
  - name: session
    description: Runtime/session metadata
  - name: broker
    description: Broker connection metadata
  - name: accounts
    description: Brokerage account state
  - name: watchlists
    description: Saved user watchlists
  - name: market-data
    description: Quotes, bars, and options chain data
  - name: orders
    description: Order and execution lifecycle
  - name: flow
    description: Options flow and unusual activity feeds
  - name: research
    description: Server-side fundamentals, filings, transcripts, and catalyst data
  - name: automation
    description: Algo deployment lifecycle and execution event history
  - name: backtests
    description: Backtest studies, runs, sweeps, and draft strategy promotion
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /session:
    get:
      operationId: getSession
      tags: [session]
      summary: Get runtime session metadata
      description: Returns environment, provider, and configuration status information.
      responses:
        "200":
          description: Session metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionInfo"

  /broker-connections:
    get:
      operationId: listBrokerConnections
      tags: [broker]
      summary: List configured broker and market data connections
      responses:
        "200":
          description: Connection inventory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerConnectionsResponse"

  /accounts:
    get:
      operationId: listAccounts
      tags: [accounts]
      summary: List broker accounts
      parameters:
        - name: mode
          in: query
          description: Filter by paper or live environment.
          required: false
          schema:
            $ref: "#/components/schemas/EnvironmentMode"
      responses:
        "200":
          description: Account list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountsResponse"

  /watchlists:
    get:
      operationId: listWatchlists
      tags: [watchlists]
      summary: List saved watchlists
      responses:
        "200":
          description: Watchlists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistsResponse"

  /positions:
    get:
      operationId: listPositions
      tags: [accounts]
      summary: List open positions
      parameters:
        - name: accountId
          in: query
          required: false
          schema:
            type: string
        - name: mode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EnvironmentMode"
      responses:
        "200":
          description: Positions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PositionsResponse"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      parameters:
        - name: accountId
          in: query
          required: false
          schema:
            type: string
        - name: mode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EnvironmentMode"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OrderStatus"
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdersResponse"
    post:
      operationId: placeOrder
      tags: [orders]
      summary: Submit an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceOrderRequest"
      responses:
        "201":
          description: Accepted order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/preview:
    post:
      operationId: previewOrder
      tags: [orders]
      summary: Preview a normalized IBKR order payload before submission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceOrderRequest"
      responses:
        "200":
          description: Preview payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderPreview"

  /orders/submit:
    post:
      operationId: submitOrders
      tags: [orders]
      summary: Submit either a normalized order request or raw IBKR order payloads
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/PlaceOrderRequest"
                - $ref: "#/components/schemas/SubmitIbkrOrdersRequest"
      responses:
        "201":
          description: Accepted order payload
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Order"
                  - $ref: "#/components/schemas/SubmitIbkrOrdersResponse"

  /orders/{orderId}/replace:
    post:
      operationId: replaceOrder
      tags: [orders]
      summary: Replace an existing IBKR order using the raw IBKR modify payload
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplaceOrderRequest"
      responses:
        "200":
          description: Updated order snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{orderId}/cancel:
    post:
      operationId: cancelOrder
      tags: [orders]
      summary: Request cancellation for an existing IBKR order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelOrderRequest"
      responses:
        "200":
          description: Cancellation request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelOrderResponse"

  /quotes/snapshot:
    get:
      operationId: getQuoteSnapshots
      tags: [market-data]
      summary: Get latest quotes for symbols
      parameters:
        - name: symbols
          in: query
          required: true
          description: Comma-separated ticker symbols.
          schema:
            type: string
      responses:
        "200":
          description: Latest quotes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteSnapshotsResponse"

  /news:
    get:
      operationId: getNews
      tags: [market-data]
      summary: Get latest market news articles
      parameters:
        - name: ticker
          in: query
          required: false
          description: Optional ticker to filter articles by symbol.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Maximum number of articles to return.
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Latest market news articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsResponse"

  /universe/tickers:
    get:
      operationId: searchUniverseTickers
      tags: [market-data]
      summary: Search the ticker universe
      parameters:
        - name: search
          in: query
          required: false
          description: Search within the ticker symbol and company name.
          schema:
            type: string
        - name: market
          in: query
          required: false
          description: Restrict results to a market.
          schema:
            $ref: "#/components/schemas/UniverseMarket"
        - name: type
          in: query
          required: false
          description: Optional Polygon ticker type filter.
          schema:
            type: string
        - name: active
          in: query
          required: false
          description: Restrict results to active tickers.
          schema:
            type: boolean
        - name: limit
          in: query
          required: false
          description: Maximum number of search results to return.
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Ticker universe search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UniverseTickersResponse"

  /bars:
    get:
      operationId: getBars
      tags: [market-data]
      summary: Get broker-first historical bars for a symbol or contract
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: timeframe
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/BarTimeframe"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50000
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: assetClass
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/AssetClass"
        - name: providerContractId
          in: query
          required: false
          schema:
            type: string
            nullable: true
        - name: outsideRth
          in: query
          required: false
          schema:
            type: boolean
        - name: source
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BarDataSource"
      responses:
        "200":
          description: Historical bars
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BarsResponse"

  /options/chains:
    get:
      operationId: getOptionChain
      tags: [market-data]
      summary: Get options chain snapshot
      parameters:
        - name: underlying
          in: query
          required: true
          schema:
            type: string
        - name: expirationDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: contractType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OptionRight"
      responses:
        "200":
          description: Options chain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptionChainResponse"

  /streams/quotes:
    get:
      operationId: streamQuoteSnapshots
      tags: [market-data]
      summary: Stream quote snapshots over server-sent events
      parameters:
        - name: symbols
          in: query
          required: true
          description: Comma-separated ticker symbols.
          schema:
            type: string
      responses:
        "200":
          description: Quote snapshot SSE stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SseStream"

  /streams/options/chains:
    get:
      operationId: streamOptionChains
      tags: [market-data]
      summary: Stream option chain snapshots over server-sent events
      parameters:
        - name: underlyings
          in: query
          required: true
          description: Comma-separated underlying symbols.
          schema:
            type: string
      responses:
        "200":
          description: Option chain SSE stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SseStream"

  /streams/orders:
    get:
      operationId: streamOrders
      tags: [orders]
      summary: Stream order snapshots over server-sent events
      parameters:
        - name: accountId
          in: query
          required: false
          schema:
            type: string
        - name: mode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EnvironmentMode"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OrderStatus"
      responses:
        "200":
          description: Orders SSE stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SseStream"

  /streams/accounts:
    get:
      operationId: streamAccounts
      tags: [accounts]
      summary: Stream account and position snapshots over server-sent events
      parameters:
        - name: accountId
          in: query
          required: false
          schema:
            type: string
        - name: mode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EnvironmentMode"
      responses:
        "200":
          description: Accounts SSE stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SseStream"

  /streams/stocks/aggregates:
    get:
      operationId: streamStockAggregates
      tags: [market-data]
      summary: Stream broker-derived stock minute aggregates over server-sent events
      parameters:
        - name: symbols
          in: query
          required: true
          description: Comma-separated ticker symbols.
          schema:
            type: string
      responses:
        "200":
          description: Stock aggregate SSE stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SseStream"

  /flow/events:
    get:
      operationId: listFlowEvents
      tags: [flow]
      summary: List options flow events
      parameters:
        - name: underlying
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: Options flow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowEventsResponse"

  /research/status:
    get:
      operationId: getResearchStatus
      tags: [research]
      summary: Get research provider status
      description: Returns whether the server-side research provider is configured.
      responses:
        "200":
          description: Research provider status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchStatus"

  /research/fundamentals:
    get:
      operationId: getResearchFundamentals
      tags: [research]
      summary: Get research fundamentals for a symbol
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: TTM fundamentals and profile metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchFundamentalsResponse"

  /research/earnings-calendar:
    get:
      operationId: getResearchEarningsCalendar
      tags: [research]
      summary: Get earnings calendar entries
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Earnings calendar entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchCalendarResponse"

  /research/sec-filings:
    get:
      operationId: getResearchSecFilings
      tags: [research]
      summary: Get recent SEC filings for a symbol
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Recent SEC filings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchFilingsResponse"

  /research/transcripts:
    get:
      operationId: getResearchTranscripts
      tags: [research]
      summary: List available transcript dates for a symbol
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Transcript date inventory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchTranscriptsResponse"

  /research/transcript:
    get:
      operationId: getResearchTranscript
      tags: [research]
      summary: Get a transcript for a symbol
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: quarter
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 4
        - name: year
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Transcript content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchTranscriptResponse"

  /algo/deployments:
    get:
      operationId: listAlgoDeployments
      tags: [automation]
      summary: List saved algo deployments
      parameters:
        - name: mode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EnvironmentMode"
      responses:
        "200":
          description: Deployment inventory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlgoDeploymentsResponse"
    post:
      operationId: createAlgoDeployment
      tags: [automation]
      summary: Create an algo deployment linked to a promoted strategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAlgoDeploymentRequest"
      responses:
        "201":
          description: Created deployment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlgoDeployment"

  /algo/deployments/{deploymentId}/enable:
    post:
      operationId: enableAlgoDeployment
      tags: [automation]
      summary: Enable an algo deployment
      parameters:
        - name: deploymentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated deployment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlgoDeployment"

  /algo/deployments/{deploymentId}/pause:
    post:
      operationId: pauseAlgoDeployment
      tags: [automation]
      summary: Pause an algo deployment
      parameters:
        - name: deploymentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated deployment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlgoDeployment"

  /algo/events:
    get:
      operationId: listExecutionEvents
      tags: [automation]
      summary: List execution and deployment lifecycle events
      parameters:
        - name: deploymentId
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: Execution events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutionEventsResponse"

  /charting/pine-scripts:
    get:
      operationId: listPineScripts
      tags: [charting]
      summary: List saved Pine scripts for chart indicators
      responses:
        "200":
          description: Pine script library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PineScriptsResponse"
    post:
      operationId: createPineScript
      tags: [charting]
      summary: Create a Pine script library entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePineScriptRequest"
      responses:
        "201":
          description: Created Pine script
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PineScriptRecord"

  /charting/pine-scripts/{scriptId}:
    patch:
      operationId: updatePineScript
      tags: [charting]
      summary: Update a Pine script library entry
      parameters:
        - name: scriptId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePineScriptRequest"
      responses:
        "200":
          description: Updated Pine script
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PineScriptRecord"

  /backtests/strategies:
    get:
      operationId: listBacktestStrategies
      tags: [backtests]
      summary: List available backtest strategies
      responses:
        "200":
          description: Strategy catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestStrategiesResponse"

  /backtests/studies:
    get:
      operationId: listBacktestStudies
      tags: [backtests]
      summary: List saved backtest studies
      responses:
        "200":
          description: Backtest studies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestStudiesResponse"
    post:
      operationId: createBacktestStudy
      tags: [backtests]
      summary: Create a backtest study
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacktestStudyInput"
      responses:
        "201":
          description: Created study
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestStudyRecord"

  /backtests/studies/{studyId}:
    get:
      operationId: getBacktestStudy
      tags: [backtests]
      summary: Get one backtest study
      parameters:
        - name: studyId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Backtest study
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestStudyRecord"

  /backtests/studies/{studyId}/preview-chart:
    get:
      operationId: getBacktestStudyPreviewChart
      tags: [backtests]
      summary: Get the latest-vs-best completed study preview chart
      parameters:
        - name: studyId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Study preview chart payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestStudyPreviewChart"

  /backtests/runs:
    get:
      operationId: listBacktestRuns
      tags: [backtests]
      summary: List backtest runs
      parameters:
        - name: studyId
          in: query
          required: false
          schema:
            type: string
        - name: sweepId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BacktestJobStatus"
      responses:
        "200":
          description: Backtest runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestRunsResponse"
    post:
      operationId: createBacktestRun
      tags: [backtests]
      summary: Queue a single backtest run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBacktestRunRequest"
      responses:
        "201":
          description: Queued backtest run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestRunDetail"

  /backtests/runs/{runId}:
    get:
      operationId: getBacktestRun
      tags: [backtests]
      summary: Get one backtest run
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Backtest run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestRunDetail"

  /backtests/runs/{runId}/chart:
    get:
      operationId: getBacktestRunChart
      tags: [backtests]
      summary: Get the research-chart payload for a backtest run
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
        - name: symbol
          in: query
          required: false
          schema:
            type: string
        - name: selectedTradeId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Run chart payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestRunChart"

  /backtests/runs/{runId}/promote:
    post:
      operationId: promoteBacktestRun
      tags: [backtests]
      summary: Promote a completed run into a draft algo strategy
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromoteBacktestRunRequest"
      responses:
        "201":
          description: Draft strategy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestDraftStrategy"

  /backtests/sweeps:
    post:
      operationId: createBacktestSweep
      tags: [backtests]
      summary: Queue a backtest optimizer sweep
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBacktestSweepRequest"
      responses:
        "201":
          description: Queued sweep
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestSweepDetail"

  /backtests/sweeps/{sweepId}:
    get:
      operationId: getBacktestSweep
      tags: [backtests]
      summary: Get one optimizer sweep
      parameters:
        - name: sweepId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sweep detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestSweepDetail"

  /backtests/jobs:
    get:
      operationId: listBacktestJobs
      tags: [backtests]
      summary: List backtest jobs
      responses:
        "200":
          description: Backtest job queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestJobsResponse"

  /backtests/jobs/{jobId}/cancel:
    post:
      operationId: cancelBacktestJob
      tags: [backtests]
      summary: Request cancellation for a queued or running job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated job state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestJobSummary"

  /backtests/drafts:
    get:
      operationId: listBacktestDraftStrategies
      tags: [backtests]
      summary: List promoted draft strategies
      responses:
        "200":
          description: Draft strategies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestDraftStrategiesResponse"
