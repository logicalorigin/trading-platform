<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>PYRUS Platform</title>
    <link rel="icon" type="image/png" href="/brand/pyrus-mark.png" />
    <script>
      (() => {
        const storageKey = "pyrus:state:v1";
        const legacyStorageKey = "pyrus:state:v1";
        const readState = () => {
          try {
            const raw =
              window.localStorage?.getItem(storageKey) ??
              window.localStorage?.getItem(legacyStorageKey) ??
              "{}";
            return JSON.parse(raw);
          } catch {
            return {};
          }
        };
        const resolveSystemTheme = () => {
          try {
            return window.matchMedia?.("(prefers-color-scheme: dark)")?.matches
              ? "dark"
              : "light";
          } catch {
            return "light";
          }
        };
        const resolveTheme = () => {
          try {
            const state = readState();
            const preferenceTheme = state?.userPreferences?.appearance?.theme;
            if (preferenceTheme === "light" || preferenceTheme === "dark") {
              return preferenceTheme;
            }
            if (preferenceTheme === "system") {
              return resolveSystemTheme();
            }
            if (state?.theme === "light" || state?.theme === "dark") {
              return state.theme;
            }
            return resolveSystemTheme();
          } catch {
            return resolveSystemTheme();
          }
        };

        const theme = resolveTheme();
        document.documentElement.dataset.pyrusTheme = theme;
        document.documentElement.dataset.pyrusTheme = theme;

        const resolveAccentPreset = () => {
          try {
            const state = readState();
            const preset = state?.userPreferences?.appearance?.accentPreset;
            if (
              preset === "pyrus" ||
              preset === "coral" ||
              preset === "amber" ||
              preset === "green" ||
              preset === "aurora"
            ) {
              return preset;
            }
            return "pyrus";
          } catch {
            return "pyrus";
          }
        };
        const accentPreset = resolveAccentPreset();
        document.documentElement.dataset.pyrusAccentPreset = accentPreset;
        document.documentElement.dataset.pyrusAccentPreset = accentPreset;
        // Paint the page bg + text color before any stylesheet loads to avoid
        // a flash of unstyled (dark default) content during boot.
        const root = document.documentElement;
        const body = document.body;
        const bg = theme === "dark" ? "#050814" : "#F7FAFF";
        const fg = theme === "dark" ? "#F4F8FF" : "#101827";
        root.style.background = bg;
        if (body) {
          body.style.background = bg;
          body.style.color = fg;
        } else {
          // Apply on first DOMContentLoaded if body is not yet available.
          document.addEventListener(
            "DOMContentLoaded",
            () => {
              document.body.style.background = bg;
              document.body.style.color = fg;
            },
            { once: true },
          );
        }
      })();
    </script>
    <script>
      (() => {
        const benignMessages = new Set([
          "ResizeObserver loop completed with undelivered notifications.",
          "ResizeObserver loop limit exceeded",
        ]);

        window.addEventListener("error", (event) => {
          if (!benignMessages.has(event.message)) {
            return;
          }

          event.preventDefault();
          event.stopImmediatePropagation();
        }, true);

        window.addEventListener("unhandledrejection", (event) => {
          const reasonText = typeof event.reason === "string"
            ? event.reason
            : event.reason instanceof Error
              ? event.reason.message
              : "";

          if (!benignMessages.has(reasonText)) {
            return;
          }

          event.preventDefault();
          event.stopImmediatePropagation();
        });
      })();
    </script>
    <style>
      #root {
        min-height: 100vh;
      }

      .pyrus-boot-loader {
        align-items: center;
        background: #050914;
        color: #f4f8ff;
        display: flex;
        font-family: "IBM Plex Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        justify-content: center;
        min-height: 100vh;
        min-height: 100dvh;
      }

      .pyrus-boot-lockup {
        align-items: center;
        display: inline-flex;
        flex-direction: column;
        gap: 24px;
        justify-content: center;
        line-height: 0;
      }

      .pyrus-boot-mark {
        animation: pyrus-boot-mark 1.05s cubic-bezier(0.16, 1, 0.3, 1) both;
        display: block;
        height: 104px;
        object-fit: contain;
        transform-origin: 50% 50%;
        user-select: none;
        width: 104px;
        will-change: opacity, transform, filter;
      }

      .pyrus-boot-word {
        animation: pyrus-boot-word 0.72s cubic-bezier(0.16, 1, 0.3, 1) 0.74s both;
        color: #f4f8ff;
        font-size: 28px;
        font-weight: 600;
        letter-spacing: 0;
        line-height: 1;
        will-change: opacity, transform, filter;
      }

      .pyrus-boot-sr {
        clip: rect(0 0 0 0);
        height: 1px;
        overflow: hidden;
        position: absolute;
        white-space: nowrap;
        width: 1px;
      }

      @keyframes pyrus-boot-mark {
        0% {
          opacity: 1;
          transform: rotate(-18deg) scale(0.96);
          filter: brightness(0.86);
        }

        55% {
          opacity: 1;
          filter: blur(0) brightness(1);
        }

        80% {
          transform: rotate(5deg) scale(1.045);
          filter: brightness(1.55);
        }

        100% {
          opacity: 1;
          transform: rotate(0deg) scale(1);
          filter: brightness(1);
        }
      }

      @keyframes pyrus-boot-word {
        0% {
          opacity: 0;
          transform: translateY(12px) scale(0.965);
          filter: blur(5px) brightness(0.72);
        }

        48% {
          opacity: 0.72;
          transform: translateY(3px) scale(0.99);
          filter: blur(1.4px) brightness(1.18);
        }

        78% {
          opacity: 1;
          transform: translateY(-1px) scale(1.018);
          filter: blur(0) brightness(1.22);
        }

        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
          filter: blur(0) brightness(1);
        }
      }

      @media (max-width: 520px) {
        .pyrus-boot-mark {
          height: 88px;
          width: 88px;
        }

        .pyrus-boot-word {
          font-size: 24px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .pyrus-boot-mark,
        .pyrus-boot-word {
          animation: none;
          filter: none;
          opacity: 1;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="pyrus-boot-loader" data-testid="pyrus-boot-loader" role="status" aria-label="Loading PYRUS">
        <div class="pyrus-boot-lockup" aria-hidden="true">
          <img
            class="pyrus-boot-mark"
            src="/brand/pyrus-loader-mark-dark.svg"
            alt=""
            decoding="async"
            fetchpriority="high"
            draggable="false"
          />
          <div class="pyrus-boot-word">PYRUS</div>
        </div>
        <span class="pyrus-boot-sr">Loading PYRUS</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
