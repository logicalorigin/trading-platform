        - name: studyId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Backtest study
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestStudyRecord"

  /backtests/studies/{studyId}/preview-chart:
    get:
      operationId: getBacktestStudyPreviewChart
      tags: [backtests]
      summary: Get the latest-vs-best completed study preview chart
      parameters:
        - name: studyId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Study preview chart payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestStudyPreviewChart"

  /backtests/runs:
    get:
      operationId: listBacktestRuns
      tags: [backtests]
      summary: List backtest runs
      parameters:
        - name: studyId
          in: query
          required: false
          schema:
            type: string
        - name: sweepId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/BacktestJobStatus"
      responses:
        "200":
          description: Backtest runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestRunsResponse"
    post:
      operationId: createBacktestRun
      tags: [backtests]
      summary: Queue a single backtest run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBacktestRunRequest"
      responses:
        "201":
          description: Queued backtest run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestRunDetail"

  /backtests/runs/{runId}:
    get:
      operationId: getBacktestRun
      tags: [backtests]
      summary: Get one backtest run
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Backtest run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestRunDetail"

  /backtests/runs/{runId}/chart:
    get:
      operationId: getBacktestRunChart
      tags: [backtests]
      summary: Get the research-chart payload for a backtest run
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
        - name: symbol
          in: query
          required: false
          schema:
            type: string
        - name: selectedTradeId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Run chart payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestRunChart"

  /backtests/runs/{runId}/promote:
    post:
      operationId: promoteBacktestRun
      tags: [backtests]
      summary: Promote a completed run into a draft algo strategy
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromoteBacktestRunRequest"
      responses:
        "201":
          description: Draft strategy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestDraftStrategy"

  /backtests/sweeps:
    post:
      operationId: createBacktestSweep
      tags: [backtests]
      summary: Queue a backtest optimizer sweep
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBacktestSweepRequest"
      responses:
        "201":
          description: Queued sweep
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestSweepDetail"

  /backtests/sweeps/{sweepId}:
    get:
      operationId: getBacktestSweep
      tags: [backtests]
      summary: Get one optimizer sweep
      parameters:
        - name: sweepId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sweep detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestSweepDetail"

  /backtests/jobs:
    get:
      operationId: listBacktestJobs
      tags: [backtests]
      summary: List backtest jobs
      responses:
        "200":
          description: Backtest job queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestJobsResponse"

  /backtests/jobs/{jobId}/cancel:
    post:
      operationId: cancelBacktestJob
      tags: [backtests]
      summary: Request cancellation for a queued or running job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated job state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestJobSummary"

  /backtests/drafts:
    get:
      operationId: listBacktestDraftStrategies
      tags: [backtests]
      summary: List promoted draft strategies
      responses:
        "200":
          description: Draft strategies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestDraftStrategiesResponse"
components:
  parameters:
    AccountIdPath:
      name: accountId
      in: path
      required: true
      description: IBKR account id or the virtual "combined" account id.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
      required:
        - status

    EnvironmentMode:
      type: string
      enum: [paper, live]

    BrokerProvider:
      type: string
      enum: [ibkr]

    MarketDataProvider:
      type: string
      enum: [polygon, ibkr]

    FlowDataProvider:
      type: string
      enum: [ibkr, polygon]

    FlowEventBasis:
      type: string
      enum: [snapshot, trade]

    FlowEventsSourceProvider:
      type: string
      enum: [ibkr, polygon, none]

    FlowEventsSourceStatus:
      type: string
      enum: [live, fallback, empty, error]

    UniverseMarket:
      type: string
      enum: [stocks, etf, indices, futures, fx, crypto, otc]

    ResearchProvider:
      type: string
      enum: [fmp]

    ConnectionStatus:
      type: string
      enum: [configured, connected, disconnected, error]

    AssetClass:
      type: string
      enum: [equity, option]

    OptionRight:
      type: string
      enum: [call, put]

    OrderSide:
      type: string
      enum: [buy, sell]

    OrderType:
      type: string
      enum: [market, limit, stop, stop_limit]

    TimeInForce:
      type: string
      enum: [day, gtc, ioc, fok]

    OrderStatus:
      type: string
      enum:
        [
          pending_submit,
          submitted,
          accepted,
          partially_filled,
          filled,
          canceled,
          rejected,
          expired,
        ]

    BarTimeframe:
      type: string
      enum: [1s, 5s, 15s, 1m, 5m, 15m, 1h, 1d]

    SignalMonitorTimeframe:
      type: string
      enum: [1m, 5m, 15m, 1h, 1d]

    SignalMonitorMatrixTimeframe:
      type: string
      enum: [2m, 5m, 15m]

    FlowSentiment:
      type: string
      enum: [bullish, bearish, neutral]

    QuoteSource:
      type: string
      enum: [ibkr, polygon]

    BarDataSource:
      type: string
      enum: [trades, midpoint, bid_ask]

    JsonObject:
      type: object
      additionalProperties: true

    SessionMarketDataProviders:
      type: object
      properties:
        live:
          $ref: "#/components/schemas/MarketDataProvider"
        historical:
          $ref: "#/components/schemas/MarketDataProvider"
        research:
          oneOf:
            - $ref: "#/components/schemas/MarketDataProvider"
            - $ref: "#/components/schemas/ResearchProvider"
      required:
        - live
        - historical
        - research

    IbkrBridgeConnectionHealth:
      type: object
      properties:
        transport:
          type: string
          enum:
            - tws
        role:
          type: string
          enum:
            - market_data
        configured:
          type: boolean
        reachable:
          type: boolean
        authenticated:
          type: boolean
        competing:
          type: boolean
        target:
          type: [string, "null"]
        mode:
          oneOf:
            - $ref: "#/components/schemas/EnvironmentMode"
            - type: "null"
        clientId:
          type: [integer, "null"]
        selectedAccountId:
          type: [string, "null"]
        accounts:
          type: array
          items:
            type: string
        lastPingMs:
          type: [integer, "null"]
        lastPingAt:
          type: [string, "null"]
          format: date-time
        lastTickleAt:
          type: [string, "null"]
          format: date-time
        lastError:
          type: [string, "null"]
        marketDataMode:
          type: [string, "null"]
          enum:
            - live
            - frozen
            - delayed
            - delayed_frozen
            - unknown
            - null
        liveMarketDataAvailable:
          type: [boolean, "null"]
        healthFresh:
          type: boolean
        healthAgeMs:
          type: [integer, "null"]
        stale:
          type: boolean
        bridgeReachable:
          type: boolean
        socketConnected:
          type: boolean
        accountsLoaded:
          type: boolean
        configuredLiveMarketDataMode:
          type: boolean
        streamFresh:
          type: boolean
        streamState:
          type: string
          enum: [offline, login_required, checking, delayed, live, quiet, stale, capacity_limited, reconnecting, reconnect_needed]
        streamStateReason:
          type: [string, "null"]
        lastStreamEventAgeMs:
          type: [integer, "null"]
        strictReady:
          type: boolean
        strictReason:
          type: [string, "null"]
      required:
        - transport
        - role
        - configured
        - reachable
        - authenticated
        - competing
        - target
        - mode
        - clientId
        - selectedAccountId
        - accounts
        - lastPingMs
        - lastPingAt
        - lastTickleAt
        - lastError
        - marketDataMode
        - liveMarketDataAvailable

    IbkrBridgeConnectionsHealth:
      type: object
      properties:
        tws:
          $ref: "#/components/schemas/IbkrBridgeConnectionHealth"
      required:
        - tws

    IbkrBridgeHealth:
      type: object
      properties:
