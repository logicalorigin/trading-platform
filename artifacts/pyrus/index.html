<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/brand/pyrus-mark.svg" />
    <!-- Preload the boot loader's brand art so it paints with the first frame
         (no blank mark/wordmark while the static loader shows pre-React). -->
    <link rel="preload" as="image" href="/brand/pyrus-mark.svg" />
    <link rel="preload" as="image" href="/brand/pyrus-wordmark-tight.png" />
    <link rel="preload" as="image" href="/brand/pyrus-wordmark-tight-light.png" />
    <title>PYRUS Platform</title>
    <script>
      (() => {
        const storageKey = "pyrus:state:v1";
        const legacyStorageKey = "pyrus:state:v1";
        const readState = () => {
          try {
            const raw =
              window.localStorage?.getItem(storageKey) ??
              window.localStorage?.getItem(legacyStorageKey) ??
              "{}";
            return JSON.parse(raw);
          } catch {
            return {};
          }
        };
        const resolveSystemTheme = () => {
          try {
            return window.matchMedia?.("(prefers-color-scheme: dark)")?.matches
              ? "dark"
              : "light";
          } catch {
            return "light";
          }
        };
        const resolveTheme = () => {
          try {
            const state = readState();
            const preferenceTheme = state?.userPreferences?.appearance?.theme;
            if (preferenceTheme === "light" || preferenceTheme === "dark") {
              return preferenceTheme;
            }
            if (preferenceTheme === "system") {
              return resolveSystemTheme();
            }
            if (state?.theme === "light" || state?.theme === "dark") {
              return state.theme;
            }
            return resolveSystemTheme();
          } catch {
            return resolveSystemTheme();
          }
        };

        const theme = resolveTheme();
        document.documentElement.dataset.pyrusTheme = theme;
        document.documentElement.dataset.pyrusTheme = theme;

        const resolveAccentPreset = () => {
          try {
            const state = readState();
            const preset = state?.userPreferences?.appearance?.accentPreset;
            if (
              preset === "pyrus" ||
              preset === "coral" ||
              preset === "amber" ||
              preset === "green" ||
              preset === "aurora"
            ) {
              return preset;
            }
            return "pyrus";
          } catch {
            return "pyrus";
          }
        };
        const accentPreset = resolveAccentPreset();
        document.documentElement.dataset.pyrusAccentPreset = accentPreset;
        document.documentElement.dataset.pyrusAccentPreset = accentPreset;
        // Paint the page bg + text color before any stylesheet loads to avoid
        // a flash of unstyled (dark default) content during boot.
        const root = document.documentElement;
        const body = document.body;
        const bg = theme === "dark" ? "#050814" : "#F7FAFF";
        const fg = theme === "dark" ? "#F4F8FF" : "#101827";
        root.style.background = bg;
        if (body) {
          body.style.background = bg;
          body.style.color = fg;
        } else {
          // Apply on first DOMContentLoaded if body is not yet available.
          document.addEventListener(
            "DOMContentLoaded",
            () => {
              document.body.style.background = bg;
              document.body.style.color = fg;
            },
            { once: true },
          );
        }
      })();
    </script>
    <script>
      (() => {
        const benignMessages = new Set([
          "ResizeObserver loop completed with undelivered notifications.",
          "ResizeObserver loop limit exceeded",
        ]);

        window.addEventListener("error", (event) => {
          if (!benignMessages.has(event.message)) {
            return;
          }

          event.preventDefault();
          event.stopImmediatePropagation();
        }, true);

        window.addEventListener("unhandledrejection", (event) => {
          const reasonText = typeof event.reason === "string"
            ? event.reason
            : event.reason instanceof Error
              ? event.reason.message
              : "";

          if (!benignMessages.has(reasonText)) {
            return;
          }

          event.preventDefault();
          event.stopImmediatePropagation();
        });
      })();
    </script>
    <script>
      (() => {
        const stateKey = "pyrus:state:v1";
        const lastCrashKey = "pyrus:last-crash-diagnostics:v1";
        const recentBrowserEventsKey = "pyrus:recent-browser-diagnostics:v1";
        const sensitiveKeyPattern =
          /(authorization|cookie|password|secret|token|account|accountid|selectedaccount|credential|apiKey|session)/i;
        const benignMessages = new Set([
          "ResizeObserver loop completed with undelivered notifications.",
          "ResizeObserver loop limit exceeded",
        ]);

        const escapeHtml = (value) =>
          String(value ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;");

        const redactString = (value) =>
          String(value)
            .replace(/\bU\d{4,}\b/g, "U***")
            .replace(
              /([a-z][a-z0-9+.-]*:\/\/)[^/\s:@]+:[^/\s@]+@/gi,
              "$1[redacted]@",
            )
            .replace(
              /([?&](?:token|secret|password|api_key|apikey|authorization)=)[^&\s]+/gi,
              "$1[redacted]",
            )
            .slice(0, 1500);

        const redactValue = (value, key = "", depth = 0) => {
          if (sensitiveKeyPattern.test(key)) return "[redacted]";
          if (value == null || typeof value === "boolean" || typeof value === "number") {
            return value;
          }
          if (typeof value === "string") return redactString(value);
          if (depth >= 5) return "[truncated]";
          if (Array.isArray(value)) {
            return value.slice(0, 12).map((entry) => redactValue(entry, key, depth + 1));
          }
          if (typeof value === "object") {
            return Object.fromEntries(
              Object.entries(value)
                .slice(0, 40)
                .map(([entryKey, entryValue]) => [
                  entryKey,
                  redactValue(entryValue, entryKey, depth + 1),
                ]),
            );
          }
          return String(value);
        };

        const recentBrowserEvents = () => {
          try {
            const raw = window.sessionStorage?.getItem(recentBrowserEventsKey);
            const parsed = raw ? JSON.parse(raw) : [];
            return Array.isArray(parsed) ? parsed : [];
          } catch {
            return [];
          }
        };

        const getResourceTarget = (event) => {
          const target = event?.target;
          if (!target || target === window || target === document) return null;
          const tagName =
            typeof target.tagName === "string" ? target.tagName.toLowerCase() : "";
          if (!tagName) return null;
          const attr = (name) => {
            try {
              return typeof target.getAttribute === "function"
                ? target.getAttribute(name) || ""
                : "";
            } catch {
              return "";
            }
          };
          const url =
            typeof target.currentSrc === "string" && target.currentSrc
              ? target.currentSrc
              : typeof target.src === "string" && target.src
                ? target.src
                : typeof target.href === "string"
                  ? target.href
                  : attr("src") || attr("href") || "";
          const rel = typeof target.rel === "string" ? target.rel : attr("rel");
          const as = typeof target.as === "string" ? target.as : attr("as");
          const type = typeof target.type === "string" ? target.type : attr("type");
          const id = typeof target.id === "string" ? target.id : attr("id");
          const inlineModuleImport =
            !url && tagName === "script" && type === "module"
              ? String(target.textContent || "").match(/import\s+[^"']*["']([^"']+)["']/)?.[1] ||
                ""
              : "";
          return {
            tagName,
            url,
            rel,
            as,
            type,
            id,
            inlineModuleImport,
          };
        };

        const resourcePathname = (url) => {
          try {
            return new URL(url, window.location.href).pathname;
          } catch {
            return "";
          }
        };

        const isOptionalBootNeuralScriptPath = (pathname) =>
          pathname.endsWith("/src/boot-neural.tsx") ||
          pathname.endsWith("/src/boot-neural-scene.tsx") ||
          /\/assets\/boot-neural(?:-scene)?-[^/]+\.js$/.test(pathname);

        const isOptionalScriptResource = (target) => {
          if (target.tagName !== "script") return false;
          const pathname = resourcePathname(target.url || target.inlineModuleImport);
          const id = String(target.id || "").toLowerCase();
          return (
            pathname === "/@vite/client" ||
            pathname === "/@react-refresh" ||
            pathname.startsWith("/@replit/") ||
            isOptionalBootNeuralScriptPath(pathname) ||
            id === "replit-dev-banner"
          );
        };

        const isFatalResourceError = (target) => {
          if (!target) return false;
          if (target.tagName === "script") return !isOptionalScriptResource(target);
          if (target.tagName !== "link") return false;
          const rel = String(target.rel || "").toLowerCase();
          const as = String(target.as || "").toLowerCase();
          return (
            rel.includes("stylesheet") ||
            rel.includes("modulepreload") ||
            (rel.includes("preload") && (as === "script" || as === "style"))
          );
        };

        const resourceError = (target) => {
          const label = String(target?.tagName || "resource").toUpperCase();
          const url = target?.url ? `: ${target.url}` : "";
          return new Error(`Failed to load ${label} resource${url}`);
        };

        const normalizeError = (input) => {
          if (input instanceof Error) return input;
          if (input && typeof input === "object" && "message" in input) {
            const error = new Error(String(input.message || "Boot failed"));
            if (typeof input.name === "string") error.name = input.name;
            if (typeof input.stack === "string") error.stack = input.stack;
            return error;
          }
          return new Error(String(input || "Boot failed"));
        };

        const buildBundle = (error, raw) => {
          const normalized = normalizeError(error);
          return redactValue({
            kind: "pyrus-root-crash",
            capturedAt: new Date().toISOString(),
            label: "PYRUS boot",
            error: {
              name: normalized.name || "Error",
              message: normalized.message || "Boot failed",
              stack: normalized.stack || null,
            },
            componentStack: null,
            route: window.location.href,
            userAgent: navigator.userAgent,
            runtime: {
              buildMode: "pre-react",
              gitSha: document.documentElement.dataset.pyrusRuntimeGitSha || "unknown",
              sourceTreeStatus:
                document.documentElement.dataset.pyrusRuntimeSourceTreeStatus ||
                "unknown",
            },
            recentBrowserEvents: recentBrowserEvents(),
            raw,
          });
        };

        const persistBundle = (bundle) => {
          try {
            window.sessionStorage?.setItem(lastCrashKey, JSON.stringify(bundle));
          } catch {}
        };

        const openDiagnostics = () => {
          try {
            const raw = window.localStorage?.getItem(stateKey) || "{}";
            const state = JSON.parse(raw);
            window.localStorage?.setItem(
              stateKey,
              JSON.stringify({ ...state, screen: "diagnostics" }),
            );
          } catch {
            try {
              window.localStorage?.setItem(stateKey, JSON.stringify({ screen: "diagnostics" }));
            } catch {}
          }
          window.location.assign(window.location.pathname || "/");
        };

        const copyBundle = async () => {
          const text =
            document.querySelector("[data-testid='root-crash-diagnostics-bundle']")
              ?.textContent || "";
          try {
            await navigator.clipboard.writeText(text);
            const button = document.querySelector("[data-pyrus-crash-copy]");
            if (button) button.textContent = "Copied";
          } catch {
            const button = document.querySelector("[data-pyrus-crash-copy]");
            if (button) button.textContent = "Copy failed";
          }
        };

        const renderCrashDiagnostics = (bundle) => {
          const render = () => {
            const root = document.getElementById("root") || document.body;
            if (!root || root.querySelector("[data-testid='root-crash-diagnostics']")) {
              return;
            }
            const bundleText = JSON.stringify(bundle, null, 2);
            root.innerHTML = `
              <main data-testid="root-crash-diagnostics" style="min-height:100vh;box-sizing:border-box;padding:24px;background:#16151A;color:#F2EFE9;font-family:IBM Plex Sans,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;">
                <section style="max-width:1180px;margin:0 auto;display:grid;gap:16px;">
                  <header style="display:grid;gap:12px;">
                    <div style="color:#F2EFE9;font-size:18px;font-weight:700;line-height:1;">PYRUS</div>
                    <div style="color:#D9A864;font-size:12px;font-weight:700;text-transform:uppercase;">PYRUS ROOT CRASH</div>
                    <h1 style="margin:0;font-size:24px;line-height:1.15;">${escapeHtml(bundle.error?.message || "Boot failed")}</h1>
                    <div style="color:#B8B4AC;font-size:12px;">${escapeHtml(bundle.runtime?.buildMode || "pre-react")} / ${escapeHtml(bundle.runtime?.gitSha || "unknown")} / ${escapeHtml(bundle.runtime?.sourceTreeStatus || "unknown")}</div>
                    <div style="display:flex;flex-wrap:wrap;gap:8px;">
                      <button type="button" data-pyrus-crash-retry style="min-height:34px;border:1px solid rgba(232,229,222,0.24);background:#232227;color:#F2EFE9;padding:7px 11px;font:600 12px IBM Plex Sans,system-ui;cursor:pointer;">Retry</button>
                      <button type="button" data-pyrus-crash-diagnostics style="min-height:34px;border:1px solid rgba(232,229,222,0.24);background:#232227;color:#F2EFE9;padding:7px 11px;font:600 12px IBM Plex Sans,system-ui;cursor:pointer;">Open Diagnostics</button>
                      <button type="button" data-pyrus-crash-copy style="min-height:34px;border:1px solid rgba(232,229,222,0.24);background:#232227;color:#F2EFE9;padding:7px 11px;font:600 12px IBM Plex Sans,system-ui;cursor:pointer;">Copy bundle</button>
                    </div>
                  </header>
                  <section style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;">
                    <div style="border:1px solid #2F2E35;padding:14px;">
                      <h2 style="margin:0 0 8px;font-size:13px;">Crash</h2>
                      <pre style="margin:0;white-space:pre-wrap;color:#B8B4AC;font-size:11px;">${escapeHtml(bundle.error?.stack || bundle.error?.message || "Boot failed")}</pre>
                    </div>
                    <div style="border:1px solid #2F2E35;padding:14px;">
                      <h2 style="margin:0 0 8px;font-size:13px;">Diagnostics</h2>
                      <div style="color:#B8B4AC;font-size:12px;">React did not mount. The static PYRUS boot guard rendered this page before the app shell could start.</div>
                    </div>
                  </section>
                  <section style="border:1px solid #2F2E35;padding:14px;">
                    <h2 style="margin:0 0 8px;font-size:13px;">Redacted Bundle</h2>
                    <pre data-testid="root-crash-diagnostics-bundle" style="max-height:360px;overflow:auto;margin:0;white-space:pre-wrap;color:#B8B4AC;font-size:11px;line-height:1.45;">${escapeHtml(bundleText)}</pre>
                  </section>
                </section>
              </main>
            `;
            root.querySelector("[data-pyrus-crash-retry]")?.addEventListener("click", () => {
              window.location.reload();
            });
            root.querySelector("[data-pyrus-crash-diagnostics]")?.addEventListener(
              "click",
              openDiagnostics,
            );
            root.querySelector("[data-pyrus-crash-copy]")?.addEventListener(
              "click",
              copyBundle,
            );
          };
          if (document.getElementById("root") || document.body) {
            render();
          } else {
            document.addEventListener("DOMContentLoaded", render, { once: true });
          }
        };

        const handleCrash = (event, kind) => {
          const message =
            kind === "error"
              ? event.message || event.error?.message || ""
                : event.reason instanceof Error
                  ? event.reason.message
                  : String(event.reason || "");
          if (benignMessages.has(message)) return;
          const resourceTarget = kind === "error" ? getResourceTarget(event) : null;
          if (resourceTarget && !isFatalResourceError(resourceTarget)) return;
          if (
            kind === "error" &&
            !resourceTarget &&
            isOptionalBootNeuralScriptPath(resourcePathname(event.filename || ""))
          ) {
            event.preventDefault?.();
            event.stopImmediatePropagation?.();
            return;
          }
          if (
            kind === "error" &&
            !resourceTarget &&
            !message &&
            !event.error &&
            !event.filename
          ) {
            return;
          }
          const bundle = buildBundle(
            kind === "error"
              ? event.error || (resourceTarget ? resourceError(resourceTarget) : message)
              : event.reason || message,
            kind === "error"
              ? {
                  kind,
                  message,
                  filename: event.filename,
                  lineno: event.lineno,
                  colno: event.colno,
                  target: resourceTarget,
                }
              : { kind, message },
          );
          persistBundle(bundle);
          renderCrashDiagnostics(bundle);
          event.preventDefault?.();
          event.stopImmediatePropagation?.();
        };

        const onBootError = (event) => handleCrash(event, "error");
        const onBootUnhandledRejection = (event) =>
          handleCrash(event, "unhandledrejection");
        const dismiss = () => {
          window.removeEventListener("error", onBootError, true);
          window.removeEventListener(
            "unhandledrejection",
            onBootUnhandledRejection,
            true,
          );
        };

        window.__PYRUS_BOOT_CRASH_DIAGNOSTICS__ = {
          renderCrashDiagnostics,
          dismiss,
        };
        window.addEventListener("error", onBootError, true);
        window.addEventListener("unhandledrejection", onBootUnhandledRejection, true);
      })();
    </script>
    <style>
      #root {
        min-height: 100vh;
      }

      /* 50/50 split — matches the LoginShell layout so the brand stays put and
         the loader never bounces into a different layout when the login appears.
         Left = brand (mark + wordmark + tagline); right = progress, later form. */
      /* Full-page brand atmosphere (mirrors .pyrus-brand-atmosphere in index.css)
         — a soft neural-toned glow weighted left, fading behind the form. */
      .pyrus-boot-loader {
        background:
          radial-gradient(78% 104% at 26% 42%,
            rgba(22, 139, 255, 0.13) 0%,
            rgba(120, 46, 156, 0.07) 30%,
            rgba(255, 61, 42, 0.06) 47%,
            rgba(247, 250, 255, 0) 72%),
          radial-gradient(60% 80% at 80% 78%,
            rgba(255, 61, 42, 0.04) 0%,
            rgba(247, 250, 255, 0) 70%),
          #F7FAFF;
        color: #101827;
        display: grid;
        grid-template-columns: 1fr 1fr;
        font-family: "IBM Plex Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
        position: relative;
      }

      @media (max-width: 879px) {
        .pyrus-boot-loader {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(220px, 34vh) 1fr;
        }
      }

      html[data-pyrus-theme="dark"] .pyrus-boot-loader {
        background:
          radial-gradient(78% 104% at 26% 42%,
            rgba(40, 150, 255, 0.24) 0%,
            rgba(150, 70, 190, 0.13) 30%,
            rgba(255, 80, 60, 0.11) 47%,
            rgba(5, 9, 20, 0) 72%),
          radial-gradient(60% 80% at 80% 78%,
            rgba(255, 80, 60, 0.07) 0%,
            rgba(5, 9, 20, 0) 70%),
          #050914;
        color: #f4f8ff;
      }

      .pyrus-boot-brand {
        align-items: center;
        display: flex;
        flex-direction: column;
        gap: 18px;
        justify-content: center;
        padding: 24px;
        position: relative;
        z-index: 1;
      }

      .pyrus-boot-content {
        align-items: center;
        display: flex;
        justify-content: center;
        padding: 24px;
        position: relative;
        z-index: 1;
      }

      .pyrus-boot-loading {
        margin-top: 14px;
      }

      .pyrus-boot-mark {
        display: block;
        height: 140px;
        object-fit: contain;
        pointer-events: none;
        user-select: none;
        width: 140px;
      }

      .pyrus-boot-tagline {
        color: #2F4058;
        font-size: 15px;
        letter-spacing: 0.02em;
        text-align: center;
      }

      html[data-pyrus-theme="dark"] .pyrus-boot-tagline {
        color: rgba(244, 248, 255, 0.72);
      }

      /* Branded wordmark in the pre-React loader; mirrors .pyrus-wordmark-image
         in index.css so the static loader and the React BootShellScreen match. */
      .pyrus-boot-wordmark {
        align-items: center;
        aspect-ratio: 852 / 104;
        display: inline-flex;
        justify-content: center;
        line-height: 0;
        position: relative;
        width: 200px;
        z-index: 1;
      }

      .pyrus-boot-wordmark .pyrus-wordmark-image {
        display: block;
        height: 100%;
        object-fit: contain;
        pointer-events: none;
        user-select: none;
        width: 100%;
      }

      .pyrus-boot-wordmark .pyrus-wordmark-image--light {
        display: none;
      }

      html[data-pyrus-theme="light"] .pyrus-boot-wordmark .pyrus-wordmark-image--dark {
        display: none;
      }

      html[data-pyrus-theme="light"] .pyrus-boot-wordmark .pyrus-wordmark-image--light {
        display: block;
      }

      .pyrus-boot-sr {
        clip: rect(0 0 0 0);
        height: 1px;
        overflow: hidden;
        position: absolute;
        white-space: nowrap;
        width: 1px;
      }

      /* Calm loading affordance (mirrors .pyrus-loading in index.css). */
      @keyframes pyrus-loading-slide {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(320%); }
      }

      .pyrus-loading {
        align-items: center;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .pyrus-loading-bar {
        background: rgba(16, 24, 39, 0.1);
        border-radius: 999px;
        height: 3px;
        overflow: hidden;
        position: relative;
        width: 200px;
      }

      html[data-pyrus-theme="dark"] .pyrus-loading-bar {
        background: rgba(244, 248, 255, 0.12);
      }

      .pyrus-loading-bar::after {
        animation: pyrus-loading-slide 1.15s ease-in-out infinite;
        background: linear-gradient(90deg, transparent, #168bff, transparent);
        border-radius: inherit;
        bottom: 0;
        content: "";
        left: 0;
        position: absolute;
        top: 0;
        width: 46%;
      }

      .pyrus-loading-label {
        color: #64748b;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      html[data-pyrus-theme="dark"] .pyrus-loading-label {
        color: rgba(244, 248, 255, 0.6);
      }

      @media (prefers-reduced-motion: reduce) {
        .pyrus-loading-bar::after { animation-duration: 2.6s; }
      }

    </style>
  </head>
  <body>
    <script>
      window.__PYRUS_BOOT_LOADER_STARTED_AT__ =
        typeof performance !== "undefined" && typeof performance.now === "function"
          ? performance.now()
          : Date.now();
    </script>
    <div id="root">
