<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark" />
    <title>IBKR secure viewer</title>
    <style>
      :root {
        color: #f4f8ff;
        background: #050814;
        font-family:
          "IBM Plex Sans",
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      main,
      .viewer-screen {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
      }

      main {
        position: relative;
        display: grid;
        min-width: 0;
        min-height: 0;
        background: #050814;
      }

      .viewer-screen {
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        outline: none;
      }

      .viewer-screen canvas {
        display: block;
        margin: auto;
      }

      .viewer-status {
        position: absolute;
        left: 50%;
        bottom: max(12px, env(safe-area-inset-bottom, 0px));
        display: flex;
        align-items: center;
        gap: 12px;
        max-width: calc(100% - 24px);
        min-height: 40px;
        padding: 8px 12px;
        border: 1px solid rgb(140 166 205 / 32%);
        border-radius: 6px;
        color: #f4f8ff;
        background: rgb(5 8 20 / 92%);
        box-shadow: 0 8px 28px rgb(0 0 0 / 38%);
        transform: translateX(-50%);
      }

      [data-state="connected"] .viewer-status {
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease 900ms;
      }

      .viewer-message {
        overflow: hidden;
        font-size: 13px;
        line-height: 1.4;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      button {
        min-height: 32px;
        padding: 6px 10px;
        border: 1px solid #8ca6cd;
        border-radius: 4px;
        color: #f4f8ff;
        background: #14213a;
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        white-space: nowrap;
        cursor: pointer;
      }

      button:hover {
        background: #1b2d50;
      }

      button:focus-visible {
        outline: 2px solid #9bc8ff;
        outline-offset: 2px;
      }

      [hidden] {
        display: none;
      }

      @media (prefers-reduced-motion: reduce) {
        [data-state="connected"] .viewer-status {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <main data-viewer-shell data-state="connecting">
      <div
        class="viewer-screen"
        data-viewer-screen
        aria-label="Interactive Brokers login desktop"
      ></div>
      <div class="viewer-status">
        <span
          class="viewer-message"
          data-viewer-status
          role="status"
          aria-live="polite"
        >
          Connecting to the secure IBKR viewer…
        </span>
        <button type="button" data-viewer-retry hidden>Retry connection</button>
      </div>
    </main>
    <script type="module" src="/src/ibkr-viewer/viewer.ts"></script>
  </body>
</html>
